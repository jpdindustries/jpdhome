<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jpd.industries</title>
    <meta name="description" content="A space-themed placeholder for jpd.industries with interactive starfield visuals.">
    <meta name="robots" content="noindex, follow">
    <meta name="color-scheme" content="dark light">
    <link rel="canonical" href="https://jpd.industries/">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" href="/base/assets/jpdico.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#FF0000">
    <meta property="og:title" content="jpd.industries">
    <meta property="og:description" content="A space-themed placeholder for jpd.industries with interactive starfield visuals.">
    <meta property="og:url" content="https://jpd.industries/">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://jpd.industries/assets/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:site_name" content="jpd.industries">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="jpd.industries">
    <meta name="twitter:description" content="A space-themed placeholder for jpd.industries with interactive starfield visuals.">
    <meta name="twitter:image" content="https://jpd.industries/assets/og-image.png">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/animations.css">
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": "jpd.industries",
            "url": "https://jpd.industries/",
            "description": "A space-themed placeholder for jpd.industries with interactive starfield visuals.",
            "publisher": {
                "@type": "Organization",
                "name": "JPD Industries",
                "url": "https://jpd.industries/",
                "logo": "https://jpd.industries/assets/icon-512.png",
                "sameAs": [
                    "https://github.com/jpdindustries/jpdhome"
                ]
            }
        }
    </script>
</head>
<body>
    <canvas id="nebula-canvas"></canvas>
    <canvas id="stars-canvas"></canvas>
    <div id="logo-container">
        <img src="assets/jpdlogo.png" alt="JPD Logo" id="logo">
    </div>

    <div id="space-object-container">
        <img src="assets/jpdaustronaut.png" alt="Floating Astronaut" id="astronaut" class="space-object">
        <img src="assets/meteorite.png" alt="Floating Meteorite" id="meteorite" class="space-object">
        <img src="assets/rocket.png" alt="Flying Rocket" id="rocket" class="space-object">
        <img src="assets/satellite.png" alt="Floating Satellite" id="satellite" class="space-object">
    </div>

    <script src="scripts/main.js"></script>
</body>
</html>
